name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Typecheck + Build
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm run typecheck

      - name: Production build
        run: pnpm run build

      - name: Verify dist output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "ERROR: dist/index.js not found — build failed"
            exit 1
          fi
          echo "Build OK — dist/index.js exists ($(du -sh dist/index.js | cut -f1))"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy to Railway
  #   • Runs only on push to main (not on PRs)
  #   • Waits for the build job to succeed
  #   • Requires RAILWAY_TOKEN secret in GitHub → Settings → Secrets
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deployment complete
        run: |
          echo "✅ Deployed to Railway successfully."
          echo "   Monitor: https://railway.app/dashboard"
